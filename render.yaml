services:
  - type: web
    name: easy-living
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: easy-living-db
          property: connectionString

databases:
  - name: easy-living-db
    databaseName: easyliving
    type: postgres
    plan: free
